name: Price Refresh — Forex + Crypto

on:
  schedule:
    # Every hour at :30 (offset from full scan at :00)
    # Crypto via Binance, forex via open.er-api.com — 0 Twelve Data credits used
    - cron: '30 * * * *'
  workflow_dispatch:

jobs:
  prices:
    name: Refresh forex + crypto prices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke price-scanner (prices-only mode)
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPA_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPA_URL }}/functions/v1/price-scanner?pricesOnly=true")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
