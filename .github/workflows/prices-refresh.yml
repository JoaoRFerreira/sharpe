name: Price Refresh — Forex + Crypto + ETFs

on:
  schedule:
    # Every 15 min at :05, :20, :35, :50 (offset from full scan at :00)
    # Forex via open.er-api.com, crypto via Binance, indices/ETFs via Twelve Data
    - cron: '5,20,35,50 * * * *'
  workflow_dispatch:

jobs:
  prices:
    name: Refresh all prices
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Invoke price-scanner (prices-only mode)
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPA_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPA_URL }}/functions/v1/price-scanner?pricesOnly=true")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
