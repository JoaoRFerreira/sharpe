name: Signal Scanner — Full Scan

on:
  schedule:
    # Every hour at :00 UTC (Grow plan: unlimited daily credits)
    - cron: '0 * * * *'
  workflow_dispatch:

jobs:
  scan:
    name: Full market scan (1H + 4H + Daily + Weekly)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Invoke price-scanner edge function
        run: |
          STATUS=$(curl -s -o /tmp/response.json -w "%{http_code}" \
            -X POST \
            -H "Authorization: Bearer ${{ secrets.SUPA_ANON_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{}' \
            "${{ secrets.SUPA_URL }}/functions/v1/price-scanner")
          echo "HTTP $STATUS"
          cat /tmp/response.json
          [ "$STATUS" -ge 200 ] && [ "$STATUS" -lt 300 ]
